<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900"
     role="img" aria-labelledby="ill-title ill-desc">
  <title id="ill-title">Wireless 260 GHz link bridges a vacuum gap between a room-temperature classical control stage and a cryogenic quantum processor</title>
  <desc id="ill-desc">Two rectangular blocks separated by a vacuum gap. The left block, outlined in red, contains a stylized CMOS chip and is labeled 300 K, classical control. The right block, outlined in blue, contains a three-by-three lattice of coupled qubits and is labeled 4 K, quantum processor. An orange sinusoidal wave labeled 260 GHz crosses the gap between two horn antennas, one on each block.</desc>

  <defs>
    <style>
      /* Three-color palette. Exposed as CSS custom properties so a future
         dark mode or palette tweak can override them without touching the
         SVG geometry. Fallbacks match the values in the project brief. */
      svg                        { --ill-hot:  #A31F34;
                                   --ill-cold: #1F4F7A;
                                   --ill-beam: #E67E22;
                                   --ill-fg:   #111111;
                                   --ill-fg-muted: #6B6B6B; }
      .stroke                    { fill: none; stroke-width: 2;
                                   stroke-linecap: round; stroke-linejoin: round; }
      .hot                       { stroke: var(--ill-hot); }
      .cold                      { stroke: var(--ill-cold); }
      .beam                      { stroke: var(--ill-beam); }
      .beam--thick               { stroke-width: 3; }
      .label {
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
        font-size: 36px;
        letter-spacing: 0.04em;
        fill: var(--ill-fg);
      }
      .label--accent { fill: var(--ill-beam); font-size: 30px; }
      .label--muted  { fill: var(--ill-fg-muted); font-size: 26px;
                       letter-spacing: 0.12em; text-transform: lowercase; }
    </style>
  </defs>

  <!-- =================================================================
       LEFT: 300 K classical-control stage
       ================================================================= -->
  <g aria-label="300 K classical control stage">
    <!-- Stage envelope -->
    <rect class="stroke hot" x="100" y="180" width="500" height="500" />

    <!-- Chip die (centered, with pin-out top and bottom) -->
    <rect class="stroke hot" x="210" y="320" width="280" height="220" />

    <!-- Internal floorplan blocks (suggesting placed logic / mixed-signal) -->
    <g class="stroke hot">
      <rect x="235" y="350" width="110" height="60" />
      <rect x="360" y="350" width="110" height="60" />
      <rect x="235" y="425" width="60" height="90" />
      <rect x="310" y="425" width="70" height="40" />
      <rect x="395" y="425" width="75" height="40" />
      <rect x="310" y="480" width="160" height="35" />
    </g>

    <!-- Chip pins (8 top + 8 bottom) -->
    <g class="stroke hot">
      <line x1="240" y1="295" x2="240" y2="320"/>
      <line x1="275" y1="295" x2="275" y2="320"/>
      <line x1="310" y1="295" x2="310" y2="320"/>
      <line x1="345" y1="295" x2="345" y2="320"/>
      <line x1="380" y1="295" x2="380" y2="320"/>
      <line x1="415" y1="295" x2="415" y2="320"/>
      <line x1="450" y1="295" x2="450" y2="320"/>

      <line x1="240" y1="540" x2="240" y2="565"/>
      <line x1="275" y1="540" x2="275" y2="565"/>
      <line x1="310" y1="540" x2="310" y2="565"/>
      <line x1="345" y1="540" x2="345" y2="565"/>
      <line x1="380" y1="540" x2="380" y2="565"/>
      <line x1="415" y1="540" x2="415" y2="565"/>
      <line x1="450" y1="540" x2="450" y2="565"/>
    </g>

    <!-- Caption -->
    <text class="label" x="350" y="755" text-anchor="middle">300 K — classical control</text>
  </g>

  <!-- =================================================================
       RIGHT: 4 K quantum-processor stage
       ================================================================= -->
  <g aria-label="4 K quantum processor stage">
    <!-- Stage envelope -->
    <rect class="stroke cold" x="1000" y="180" width="500" height="500" />

    <!-- 3×3 qubit lattice with nearest-neighbor couplers -->
    <g class="stroke cold">
      <!-- Couplers (drawn first so circles sit on top) -->
      <line x1="1180" y1="380" x2="1240" y2="380"/>
      <line x1="1260" y1="380" x2="1320" y2="380"/>
      <line x1="1180" y1="450" x2="1240" y2="450"/>
      <line x1="1260" y1="450" x2="1320" y2="450"/>
      <line x1="1180" y1="520" x2="1240" y2="520"/>
      <line x1="1260" y1="520" x2="1320" y2="520"/>
      <line x1="1160" y1="400" x2="1160" y2="430"/>
      <line x1="1250" y1="400" x2="1250" y2="430"/>
      <line x1="1340" y1="400" x2="1340" y2="430"/>
      <line x1="1160" y1="470" x2="1160" y2="500"/>
      <line x1="1250" y1="470" x2="1250" y2="500"/>
      <line x1="1340" y1="470" x2="1340" y2="500"/>

      <!-- Qubits -->
      <circle cx="1160" cy="380" r="26"/>
      <circle cx="1250" cy="380" r="26"/>
      <circle cx="1340" cy="380" r="26"/>
      <circle cx="1160" cy="450" r="26"/>
      <circle cx="1250" cy="450" r="26"/>
      <circle cx="1340" cy="450" r="26"/>
      <circle cx="1160" cy="520" r="26"/>
      <circle cx="1250" cy="520" r="26"/>
      <circle cx="1340" cy="520" r="26"/>
    </g>

    <!-- Caption -->
    <text class="label" x="1250" y="755" text-anchor="middle">4 K — quantum processor</text>
  </g>

  <!-- =================================================================
       MIDDLE: 260 GHz wireless beam crossing the vacuum gap
       ================================================================= -->
  <g aria-label="260 GHz wireless link across vacuum">
    <!-- Transmit horn (apex on left, aperture opens right) -->
    <polygon class="stroke beam"
             points="600,450 650,415 650,485 600,460" />

    <!-- Receive horn (apex on right, aperture opens left) -->
    <polygon class="stroke beam"
             points="1000,450 950,415 950,485 1000,460" />

    <!-- Beam: smooth sinusoid via Q + T continuation, four half-cycles -->
    <path class="stroke beam beam--thick"
          d="M 650 450
             Q 687.5 410, 725 450
             T 800 450
             T 875 450
             T 950 450" />

    <!-- Frequency label above the beam -->
    <text class="label label--accent" x="800" y="380" text-anchor="middle">260 GHz</text>

    <!-- Vacuum label below the beam -->
    <text class="label label--muted" x="800" y="545" text-anchor="middle">vacuum</text>
  </g>
</svg>
