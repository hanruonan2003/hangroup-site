<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900"
     role="img" aria-labelledby="ill-title ill-desc">
  <title id="ill-title">A 1 THz silicon array uses 91 coherently combining radiators on a single chip to launch a strong upward beam</title>
  <desc id="ill-desc">Cross-section view. A red CMOS chip strip at the bottom contains a row of small orange radiator elements connected by an interconnect mesh. Above each element, small orange wavefronts emerge; higher up, those wavefronts merge into wider coherent wavefronts that propagate upward. Labels mark 1 THz and the 91-radiator count.</desc>

  <defs>
    <style>
      svg                        { --ill-hot:  #A31F34;
                                   --ill-cold: #1F4F7A;
                                   --ill-beam: #E67E22;
                                   --ill-fg:   #111111;
                                   --ill-fg-muted: #6B6B6B; }
      .stroke                    { fill: none; stroke-width: 2;
                                   stroke-linecap: round; stroke-linejoin: round; }
      .hot                       { stroke: var(--ill-hot); }
      .cold                      { stroke: var(--ill-cold); }
      .beam                      { stroke: var(--ill-beam); }
      .beam--thick               { stroke-width: 3; }
      .beam--fill                { fill: var(--ill-beam); }
      .label {
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
        font-size: 36px;
        letter-spacing: 0.04em;
        fill: var(--ill-fg);
      }
      .label--accent { fill: var(--ill-beam); font-size: 30px; }
      .label--muted  { fill: var(--ill-fg-muted); font-size: 24px;
                       letter-spacing: 0.10em; }
    </style>
  </defs>

  <!-- =================================================================
       Top label
       ================================================================= -->
  <text class="label label--accent" x="800" y="120" text-anchor="middle">1 THz coherent radiation</text>

  <!-- =================================================================
       Combined coherent wavefronts (3 progressively wider arcs going up)
       Each wavefront spans the full chip aperture and is concave-down
       to suggest forward propagation upward.
       ================================================================= -->
  <g class="stroke beam">
    <!-- Wavefront 3 (highest, widest) -->
    <path d="M 240 240 Q 800 200, 1360 240" />
    <!-- Wavefront 2 -->
    <path d="M 240 340 Q 800 300, 1360 340" />
    <!-- Wavefront 1 (lowest, just above element wavefronts) -->
    <path d="M 240 440 Q 800 400, 1360 440" />
  </g>

  <!-- =================================================================
       Per-element wavelets — small semicircle "halo" above each radiator
       ================================================================= -->
  <g class="stroke beam">
    <!-- 11 small wavelets at the chip's top edge -->
    <path d="M 270 620 A 30 30 0 0 1 330 620" />
    <path d="M 360 620 A 30 30 0 0 1 420 620" />
    <path d="M 450 620 A 30 30 0 0 1 510 620" />
    <path d="M 540 620 A 30 30 0 0 1 600 620" />
    <path d="M 630 620 A 30 30 0 0 1 690 620" />
    <path d="M 720 620 A 30 30 0 0 1 780 620" />
    <path d="M 810 620 A 30 30 0 0 1 870 620" />
    <path d="M 900 620 A 30 30 0 0 1 960 620" />
    <path d="M 990 620 A 30 30 0 0 1 1050 620" />
    <path d="M 1080 620 A 30 30 0 0 1 1140 620" />
    <path d="M 1170 620 A 30 30 0 0 1 1230 620" />
    <path d="M 1260 620 A 30 30 0 0 1 1320 620" />
  </g>

  <!-- =================================================================
       CMOS chip strip with embedded radiating array
       ================================================================= -->
  <g aria-label="CMOS chip with 91-element radiating array">
    <!-- Chip envelope -->
    <rect class="stroke hot" x="200" y="620" width="1200" height="90" />

    <!-- Interconnect mesh inside chip (horizontal spine + branches) -->
    <g class="stroke hot">
      <!-- Spine along the chip centerline -->
      <line x1="220" y1="670" x2="1380" y2="670" />
      <!-- Branches up to each radiator base -->
      <line x1="300" y1="650" x2="300" y2="670"/>
      <line x1="390" y1="650" x2="390" y2="670"/>
      <line x1="480" y1="650" x2="480" y2="670"/>
      <line x1="570" y1="650" x2="570" y2="670"/>
      <line x1="660" y1="650" x2="660" y2="670"/>
      <line x1="750" y1="650" x2="750" y2="670"/>
      <line x1="840" y1="650" x2="840" y2="670"/>
      <line x1="930" y1="650" x2="930" y2="670"/>
      <line x1="1020" y1="650" x2="1020" y2="670"/>
      <line x1="1110" y1="650" x2="1110" y2="670"/>
      <line x1="1200" y1="650" x2="1200" y2="670"/>
      <line x1="1290" y1="650" x2="1290" y2="670"/>
    </g>

    <!-- Radiator triangles sitting at the chip's top edge -->
    <g class="beam beam--fill">
      <polygon points="290,650 310,620 310,650" stroke="none"/>
      <polygon points="380,650 400,620 400,650" stroke="none"/>
      <polygon points="470,650 490,620 490,650" stroke="none"/>
      <polygon points="560,650 580,620 580,650" stroke="none"/>
      <polygon points="650,650 670,620 670,650" stroke="none"/>
      <polygon points="740,650 760,620 760,650" stroke="none"/>
      <polygon points="830,650 850,620 850,650" stroke="none"/>
      <polygon points="920,650 940,620 940,650" stroke="none"/>
      <polygon points="1010,650 1030,620 1030,650" stroke="none"/>
      <polygon points="1100,650 1120,620 1120,650" stroke="none"/>
      <polygon points="1190,650 1210,620 1210,650" stroke="none"/>
      <polygon points="1280,650 1300,620 1300,650" stroke="none"/>
    </g>

    <!-- Power-and-control pins out the bottom -->
    <g class="stroke hot">
      <line x1="280" y1="710" x2="280" y2="735"/>
      <line x1="340" y1="710" x2="340" y2="735"/>
      <line x1="400" y1="710" x2="400" y2="735"/>
      <line x1="460" y1="710" x2="460" y2="735"/>
      <line x1="520" y1="710" x2="520" y2="735"/>
      <line x1="580" y1="710" x2="580" y2="735"/>
      <line x1="640" y1="710" x2="640" y2="735"/>
      <line x1="700" y1="710" x2="700" y2="735"/>
      <line x1="760" y1="710" x2="760" y2="735"/>
      <line x1="820" y1="710" x2="820" y2="735"/>
      <line x1="880" y1="710" x2="880" y2="735"/>
      <line x1="940" y1="710" x2="940" y2="735"/>
      <line x1="1000" y1="710" x2="1000" y2="735"/>
      <line x1="1060" y1="710" x2="1060" y2="735"/>
      <line x1="1120" y1="710" x2="1120" y2="735"/>
      <line x1="1180" y1="710" x2="1180" y2="735"/>
      <line x1="1240" y1="710" x2="1240" y2="735"/>
      <line x1="1300" y1="710" x2="1300" y2="735"/>
    </g>
  </g>

  <!-- Captions -->
  <text class="label" x="800" y="800" text-anchor="middle">91 silicon radiators · 1 mm²</text>
  <text class="label label--muted" x="800" y="840" text-anchor="middle">multi-functional radiating mesh</text>
</svg>
