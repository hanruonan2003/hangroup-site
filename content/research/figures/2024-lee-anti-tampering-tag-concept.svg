<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900"
     role="img" aria-labelledby="ill-title ill-desc">
  <title id="ill-title">A sub-THz interrogator illuminates a tagged item; the chip-item interface produces an unclonable scatter pattern that authenticates the tag</title>
  <desc id="ill-desc">Left: a red CMOS interrogator chip with a horn antenna sends a clean orange sub-THz wave rightward. Right: a tagged item is drawn as a blue rectangle (the item) with a small red chip glued to its top surface. Where the wave reaches the chip-item interface, a dashed orange line marks that boundary and a starburst of short orange rays scatters outward in irregular directions. Two of the scattered rays return leftward toward the interrogator. Caption: unclonable scatter.</desc>

  <defs>
    <style>
      svg                        { --ill-hot:  #A31F34;
                                   --ill-cold: #1F4F7A;
                                   --ill-beam: #E67E22;
                                   --ill-fg:   #111111;
                                   --ill-fg-muted: #6B6B6B; }
      .stroke                    { fill: none; stroke-width: 2;
                                   stroke-linecap: round; stroke-linejoin: round; }
      .hot                       { stroke: var(--ill-hot); }
      .cold                      { stroke: var(--ill-cold); }
      .beam                      { stroke: var(--ill-beam); }
      .beam--thick               { stroke-width: 3; }
      .dashed                    { stroke-dasharray: 4 7; }
      .label {
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
        font-size: 36px;
        letter-spacing: 0.04em;
        fill: var(--ill-fg);
      }
      .label--accent { fill: var(--ill-beam); font-size: 30px; }
      .label--muted  { fill: var(--ill-fg-muted); font-size: 24px;
                       letter-spacing: 0.10em; }
    </style>
  </defs>

  <!-- =================================================================
       LEFT: interrogator (reader) chip
       ================================================================= -->
  <g aria-label="Sub-THz interrogator">
    <!-- Stage envelope (smaller than usual; reader is supporting role) -->
    <rect class="stroke hot" x="100" y="280" width="360" height="340" />

    <!-- Chip die -->
    <rect class="stroke hot" x="170" y="370" width="220" height="160" />

    <!-- Internal blocks -->
    <g class="stroke hot">
      <rect x="185" y="385" width="65" height="50" />
      <rect x="260" y="385" width="50" height="50" />
      <rect x="320" y="385" width="60" height="50" />
      <rect x="185" y="450" width="195" height="35" />
      <rect x="185" y="495" width="195" height="25" />
    </g>

    <!-- Chip pins (smaller) -->
    <g class="stroke hot">
      <line x1="195" y1="355" x2="195" y2="370"/>
      <line x1="230" y1="355" x2="230" y2="370"/>
      <line x1="265" y1="355" x2="265" y2="370"/>
      <line x1="300" y1="355" x2="300" y2="370"/>
      <line x1="335" y1="355" x2="335" y2="370"/>
      <line x1="370" y1="355" x2="370" y2="370"/>

      <line x1="195" y1="530" x2="195" y2="545"/>
      <line x1="230" y1="530" x2="230" y2="545"/>
      <line x1="265" y1="530" x2="265" y2="545"/>
      <line x1="300" y1="530" x2="300" y2="545"/>
      <line x1="335" y1="530" x2="335" y2="545"/>
      <line x1="370" y1="530" x2="370" y2="545"/>
    </g>

    <!-- Caption -->
    <text class="label" x="280" y="690" text-anchor="middle">interrogator</text>
  </g>

  <!-- =================================================================
       RIGHT: tagged item with chip glued on top
       ================================================================= -->
  <g aria-label="Tagged item">
    <!-- The item (a generic blue object — could be a package/box) -->
    <rect class="stroke cold" x="1100" y="430" width="400" height="240" />

    <!-- Subtle texture inside item (hatch lines suggest "matter") -->
    <g class="stroke cold" stroke-opacity="0.4">
      <line x1="1120" y1="470" x2="1480" y2="470"/>
      <line x1="1120" y1="510" x2="1480" y2="510"/>
      <line x1="1120" y1="550" x2="1480" y2="550"/>
      <line x1="1120" y1="590" x2="1480" y2="590"/>
      <line x1="1120" y1="630" x2="1480" y2="630"/>
    </g>

    <!-- The anti-tampering chip glued on top of the item -->
    <rect class="stroke hot" x="1230" y="370" width="140" height="60" />
    <!-- Small internal feature on chip -->
    <g class="stroke hot">
      <rect x="1245" y="382" width="110" height="35" />
      <line x1="1275" y1="382" x2="1275" y2="417" />
      <line x1="1325" y1="382" x2="1325" y2="417" />
    </g>

    <!-- Chip pins down into the item / interface -->
    <g class="stroke hot">
      <line x1="1250" y1="430" x2="1250" y2="442"/>
      <line x1="1280" y1="430" x2="1280" y2="442"/>
      <line x1="1310" y1="430" x2="1310" y2="442"/>
      <line x1="1340" y1="430" x2="1340" y2="442"/>
    </g>

    <!-- Caption -->
    <text class="label" x="1300" y="730" text-anchor="middle">tagged item</text>
  </g>

  <!-- =================================================================
       MIDDLE: clean outgoing wave, then unclonable scatter at the
       chip-item interface, then partial back-scatter to interrogator
       ================================================================= -->
  <g aria-label="Sub-THz interrogation and unclonable scatter">
    <!-- Transmit horn (from interrogator) -->
    <polygon class="stroke beam"
             points="460,440 510,405 510,475 460,450" />

    <!-- Clean outgoing wave from interrogator toward the tagged item -->
    <path class="stroke beam beam--thick"
          d="M 510 440
             Q 547.5 405, 585 440
             T 660 440
             T 735 440
             T 810 440
             T 885 440
             T 960 440
             T 1035 440
             T 1110 440" />

    <!-- The chip-item interface (a horizontal dashed orange line, marking
         the boundary where chip meets item) -->
    <line class="stroke beam dashed"
          x1="1230" y1="431" x2="1370" y2="431" />

    <!-- Starburst of unclonable scatter at the interface center -->
    <!-- center point ~ (1300, 431). Rays go in random directions, varying
         lengths to suggest disorder/uniqueness. -->
    <g class="stroke beam">
      <line x1="1300" y1="431" x2="1140" y2="320" />
      <line x1="1300" y1="431" x2="1200" y2="260" />
      <line x1="1300" y1="431" x2="1280" y2="200" />
      <line x1="1300" y1="431" x2="1370" y2="220" />
      <line x1="1300" y1="431" x2="1455" y2="260" />
      <line x1="1300" y1="431" x2="1510" y2="345" />
      <line x1="1300" y1="431" x2="1095" y2="395" />
      <!-- Two return rays toward interrogator -->
      <line x1="1300" y1="431" x2="700"  y2="320" />
      <line x1="1300" y1="431" x2="520"  y2="380" />
    </g>

    <!-- Tiny arrow tip on the return rays so direction reads as "back" -->
    <g class="stroke beam" stroke-linejoin="miter" fill="none">
      <polyline points="710,317 700,320 705,328"/>
      <polyline points="530,376 520,380 524,387"/>
    </g>

    <!-- Labels -->
    <text class="label label--accent" x="800" y="380" text-anchor="middle">sub-THz interrogation</text>
    <text class="label label--muted" x="800" y="780" text-anchor="middle">unclonable scatter · physical fingerprint</text>
  </g>
</svg>
