# Current group members.
# One entry per person. `slug` is used for the URL: /people/<slug>/
# `photo` paths are relative to people/photos/.
# `interests` are short tags used on the People grid cards.
# Order within each group matches the order on hangroup.mit.edu/people/.

phd_students:

  - slug: eunseok-lee
    name: "Eunseok Lee"
    email: "eunseok@mit.edu"
    photo: "eunseok-lee.jpg"
    interests: ["hardware security", "mmW/THz ICs"]
    awards:
      - "Mathwork Fellowship, MIT (2023)"
      - "Doctoral Study Abroad Scholarship, Korea Foundation for Advanced Studies (2021)"
      - "Irwin Mark Jacobs and Joan Klein Jacobs MIT Presidential Fellowship (2020)"
    bio: >
      Eunseok Lee (co-advised by Prof. Anantha Chandrakasan) received the
      B.S. degree in electrical engineering from the Korea Advanced
      Institute of Science and Technology (KAIST) in 2020, and the M.S.
      degree in EECS from MIT in 2023, where he is currently pursuing the
      Ph.D. degree. His research focus is mmWave/THz and hardware-security
      systems for low-power, ultra-miniaturized platforms — spanning
      digital, analog/mixed-signal, and THz ICs.

  - slug: xibi-chen
    name: "Xibi Chen"
    email: "xibichen@mit.edu"
    photo: "xibi-chen.jpg"
    interests: ["FMCW radar", "sub-THz circuits"]
    bio: >
      Xibi Chen is a Ph.D. student in the Terahertz Integrated Electronics
      Group at MIT. He received his B.S. and M.S. degrees from the
      Department of Electronic Engineering, Tsinghua University, Beijing,
      China, in 2017 and 2020, respectively. From 2015 to 2020 he was a
      Research Assistant at the Microwave and Antenna Institute, Tsinghua
      University. His work at MIT includes 140-GHz FMCW monostatic radar
      transceivers (ISSCC 2022, JSSC 2022).

  - slug: jaehong-jung
    name: "Jaehong Jung"
    email: "jung0214@mit.edu"
    photo: "jaehong-jung.jpg"
    interests: ["clock generation", "high-speed serial links"]
    bio: >
      Jaehong Jung (co-advised by Prof. Anantha Chandrakasan) received the
      B.S. and M.S. degrees in semiconductor systems engineering from
      Sungkyunkwan University, Suwon, South Korea, in 2015 and 2017. He is
      currently pursuing the Ph.D. at MIT EECS. Since 2017 he has been
      with Samsung Electronics, Hwaseong, focused on high-quality clock
      generation ICs including PLLs, DLLs, on-chip oscillators, and
      crystal oscillators for SoC platforms and RF transceivers. His
      interests include high-speed serial links, clock generation ICs,
      ultra-low power ICs, and fully synthesized calibration algorithms.

  - slug: yan-xu
    name: "Yan Xu"
    email: "yanx1326@mit.edu"
    photo: "yan-xu.jpg"
    interests: ["Artificial Intelligence", "EDA"]
    bio: >
      Yan Xu received the B.S. degree in Microelectronics Science and
      Engineering from the University of Electronic Science and Technology
      of China (UESTC) in 2023. She is currently pursuing the Ph.D. degree
      in the Department of Electrical Engineering and Computer Science
      (EECS) at MIT. During her Bachelor's she interned as a research
      assistant in the Rice Integrated Systems and Electromagnetics (RISE)
      Lab, working on implantable wireless data transfer.

  - slug: pradyot-yadav
    name: "Pradyot Yadav"
    email: "yadavps@mit.edu"
    photo: "pradyot-yadav.jpg"
    interests:
      - "3D heterogeneous integration"
      - "sub-THz & mmWave circuits"
      - "advanced packaging"
    links:
      website: "https://yadavps.com"
      scholar: "https://scholar.google.com/citations?user=2tQI6eAAAAAJ"
      orcid: "https://orcid.org/0000-0003-2071-5647"
      linkedin: "https://www.linkedin.com/in/pradyot-yadav-b284b216a/"
    bio: >
      Pradyot Yadav (Graduate Student Member, IEEE) is a 4th-year Ph.D.
      candidate at MIT, co-advised by Prof. Tomás Palacios and Prof.
      Ruonan Han. He received his B.S. in Electrical Engineering with
      highest honors from the Georgia Institute of Technology in 2022,
      where he worked with Prof. Hua Wang and Prof. James Kenney on GaN
      power amplifier design, and his S.M. in Electrical Engineering from
      MIT in 2024. His current research interests are the development of
      devices, circuits, and packages for RF 3D heterogeneously integrated
      chips — advancing mmWave and sub-THz systems through the integration
      of GaN, Si CMOS, glass, and diamond substrates, novel sub-THz GaN
      transistors, and advanced packaging using DTCO/STCO.


      From 2020 to 2021, he was a Microwave Module Intern and R&D Intern
      at Qorvo Inc., Richardson, TX. From 2024 to 2025, he was a Quantum
      Research Scientist Intern at the IBM Thomas J. Watson Research
      Center, Yorktown Heights, NY. He is currently an Advanced Technology
      Intern at Raytheon, Tewksbury, MA, alongside his role as a Graduate
      Research Assistant at MIT.


      Mr. Yadav received First Place in the High-Efficiency Power
      Amplifier (HEPA) Student Design Competition for his 3-GHz GaN
      Doherty amplifier design at the IEEE MTT-S International Microwave
      Symposium (IMS) 2019. He received the Best Student Award in
      Electronic Devices at the 15th International Conference on Nitride
      Semiconductors (ICNS-15), the IEEE MTT-S 2023 Graduate Research
      Fellowship, and the SRC JUMP 2.0 CHIMES Annual Review Best Poster
      Award in 2023, 2024, and 2025. He was also an IEEE Radio Frequency
      Integrated Circuits Symposium (RFIC) 2025 Best Student Paper
      Finalist. He is a Department of War National Defense Science and
      Engineering Graduate (DoW NDSEG) Fellow and a Barry Goldwater
      Scholar. He serves as a reviewer for IEEE Electron Device Letters
      and IEEE Microwave and Wireless Technology Letters.

  - slug: krishna-pochana
    name: "Krishna Pochana"
    email: "kpochana@mit.edu"
    photo: "krishna-pochana.jpg"
    interests: ["mmW/THz platforms", "imaging", "biomedical"]
    bio: >
      Krishna Pochana received his B.S. degree in Electrical Engineering
      from the California Institute of Technology (Caltech) in 2024. He is
      currently pursuing a Ph.D. in Electrical Engineering and Computer
      Science in the Terahertz Integrated Electronics Group at MIT. His
      research interests are in mmWave/THz platforms for low-power,
      ultra-miniaturized systems in application spaces including robotics,
      biomedicine, imaging, and other novel areas.

  - slug: nicholas-lee
    name: "Nicholas (Sihyun) Lee"
    email: "nsihyun@mit.edu"
    photo: "nicholas-lee.jpg"
    interests: ["wireline communication"]
    awards:
      - "2025 Grass Instrument Company Fellowship"
    bio: >
      Nicholas (Sihyun) Lee received his B.S. in Electrical and Computer
      Engineering from Seoul National University in 2025. He is currently
      pursuing a Ph.D. in EECS in the Terahertz Integrated Electronics
      Group at MIT. At SNU he was a research intern in the Integrated
      Circuits and Systems for Computing and Communication (IC3) Lab,
      where he worked on next-generation equalizers for high-speed
      wireline communication.

  - slug: tyler-weigand
    name: "Tyler Weigand"
    email: "tweigand@mit.edu"
    photo: "tyler-weigand.jpg"
    interests: ["mmW/THz circuits", "quantum computing"]
    bio: >
      Tyler Weigand received his B.S. in Electrical Engineering and
      Computer Science from UC Berkeley in 2025. He is currently pursuing
      a Ph.D. in EECS in the Terahertz Integrated Electronics Group at
      MIT. During his Bachelor's he worked on integrated-circuit design
      for mm-wave RF-over-fiber receivers. His research interests are in
      novel applications of mm-wave/THz circuits for sensing,
      communications, quantum computing, and more.

  - slug: sanjay-chintapally
    name: "Sanjay Chintapally"
    email: "sanjayc@mit.edu"
    photo: "sanjay-chintapally.png"
    interests: ["RF/mmW circuits", "applied electromagnetics"]
    awards:
      - "2025 MIT Jacobs Presidential Fellowship"
      - "2025 SCALE Microelectronics Undergraduate Scholarship"
      - "2025 Berkeley EECS Arthur M. Hopkin Award"
    bio: >
      Sanjay Chintapally received his B.S. in Electrical Engineering and
      Computer Science with Highest Honors from UC Berkeley in 2025. He
      is currently pursuing a Ph.D. in EECS in the Terahertz Integrated
      Electronics Group at MIT. His research interests are in RF / mmW /
      sub-THz integrated circuits and applied electromagnetics for
      communication, sensing, and other emerging applications.

  - slug: daniel-sheen
    name: "Daniel Sheen"
    email: "dsheen@mit.edu"
    photo: "daniel-sheen.jpg"
    interests: ["radio telescopes", "phased arrays"]
    awards:
      - "2022 Analog Devices Graduate Fellowship"
    bio: >
      Daniel Sheen (co-advised by Dr. Frank Lind at MIT Haystack
      Observatory) received his B.S. in Electrical Science and Engineering
      in 2019 and his M.Eng. in 2021, both from MIT. During his Master's
      he worked at Haystack Observatory, designing the UHF phased array
      feed currently in use at the Westford Radio Telescope. He then
      joined Diversified Technologies Inc. developing high-power solid-
      state microwave amplifier systems. Since Fall 2022 he has returned
      to MIT as an Analog Devices Graduate Fellow, working jointly with
      Haystack Observatory and the Terahertz Integrated Electronics Group.

