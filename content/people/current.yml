  - slug: cole-brabec
    name: "Cole Brabec"
    email: "cbrabec@mit.edu"
    photo: "cole-brabec.png"
    interests: ["analog circuits"]
    bio: >
      Cole Brabec is a PhD student with the Terahertz Integrated
      Electronics Group at MIT. Cole received his B.S. in Electrical
      Engineering from the California Institute of Technology in 2021.

  - slug: sanjay-chintapally
    name: "Sanjay Chintapally"
    email: "sanjayc@mit.edu"
    photo: "sanjay-chintapally.png"
    interests: ["RF/mmW circuits", "applied electromagnetics"]
    awards:
      - "2025 MIT Jacobs Presidential Fellowship"
      - "2025 SCALE Microelectronics Undergraduate Scholarship"
      - "2025 Berkeley EECS Arthur M. Hopkin Award"
    bio: >
      Sanjay Chintapally received his B.S. in Electrical Engineering and
      Computer Science with Highest Honors from UC Berkeley in 2025. He
      is currently pursuing a Ph.D. in EECS in the Terahertz Integrated
      Electronics Group at MIT. His research interests are in RF / mmW /
      sub-THz integrated circuits and applied electromagnetics for
      communication, sensing, and other emerging applications.

  - slug: tyler-weigand
    name: "Tyler Weigand"
    email: "tweigand@mit.edu"
    photo: "tyler-weigand.jpg"
    interests: ["mmW/THz circuits", "quantum computing"]
    bio: >
      Tyler Weigand received his B.S. in Electrical Engineering and
      Computer Science from UC Berkeley in 2025. He is currently pursuing
      a Ph.D. in EECS in the Terahertz Integrated Electronics Group at
      MIT. During his Bachelor's he worked on integrated-circuit design
      for mm-wave RF-over-fiber receivers. His research interests are in
      novel applications of mm-wave/THz circuits for sensing,
      communications, quantum computing, and more.

  - slug: nicholas-lee
    name: "Nicholas (Sihyun) Lee"
    email: "nsihyun@mit.edu"
    photo: "nicholas-lee.jpg"
    interests: ["wireline communication"]
    awards:
      - "2025 Grass Instrument Company Fellowship"
    bio: >
      Nicholas (Sihyun) Lee received his B.S. in Electrical and Computer
      Engineering from Seoul National University in 2025. He is currently
      pursuing a Ph.D. in EECS in the Terahertz Integrated Electronics
      Group at MIT. At SNU he was a research intern in the Integrated
      Circuits and Systems for Computing and Communication (IC3) Lab,
      where he worked on next-generation equalizers for high-speed
      wireline communication.

