# Current group members.
# One entry per person. `slug` is used for the URL: /people/<slug>/
# `photo` paths are relative to people/photos/ (to be added).
# `interests` are short tags used on the People grid cards.

phd_students:

  - slug: jinchen-wang
    name: "Jinchen Wang"
    email: "jinchen@mit.edu"
    photo: "jinchen-wang.jpg"
    interests: ["radar imaging", "communication", "quantum"]
    bio: >
      Jinchen Wang received the B.Eng. degree in electronic information
      engineering from the University of Electronic Science and Technology
      of China in 2019, and the B.Eng. degree with first-class honors in
      electronics and electrical engineering from the University of Glasgow
      in 2019. He is currently pursuing the Ph.D. degree with the
      Department of Electrical Engineering and Computer Science, MIT.
      His research interests include RF/mmW/THz circuits, algorithms, and
      systems for radar imaging, wireless communication, quantum computing,
      and other novel applications. He was a recipient of the IEEE MTT-S
      Undergraduate/Pre-Graduate Scholarship Award in 2019.

  - slug: pradyot-yadav
    name: "Pradyot Yadav"
    email: "yadavps@mit.edu"
    photo: "pradyot-yadav.jpg"
    interests: ["sub-THz devices", "heterogeneous integration"]
    bio: >
      Pradyot Yadav received his B.S. in electrical engineering with
      highest honors from the Georgia Institute of Technology in 2022.
      At Georgia Tech he worked with Prof. Hua Wang and Prof. James Kenney
      on GaN power amplifier design. His current research interests lie at
      the intersection of sub-THz devices, circuits, and heterogeneous
      integration — spanning transistor fabrication in the cleanroom,
      circuit design, and advanced package processing. He has held R&D
      internships at Qorvo, Raytheon, and IBM, and serves as a reviewer
      for IEEE Electron Device Letters.

  - slug: daniel-sheen
    name: "Daniel Sheen"
    email: "dsheen@mit.edu"
    photo: "daniel-sheen.jpg"
    interests: ["radio telescopes", "phased arrays"]
    bio: >
      Daniel Sheen received his B.S. in Electrical Science and Engineering
      in 2019 and his M.Eng. in 2021, both from MIT. During his Master's
      he worked at Haystack Observatory, designing the UHF phased array
      feed currently in use at the Westford Radio Telescope. He then
      joined Diversified Technologies Inc. developing high-power solid-
      state microwave amplifier systems. Since Fall 2022 he has returned
      to MIT as an Analog Devices Graduate Fellow, working jointly with
      Haystack Observatory and the Terahertz Integrated Electronics Group.

  - slug: eunseok-lee
    name: "Eunseok Lee"
    email: "eunseok@mit.edu"
    photo: "eunseok-lee.jpg"
    interests: ["hardware security", "cryptographic tags"]
    bio: >
