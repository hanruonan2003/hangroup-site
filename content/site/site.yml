site:
  name: "Terahertz Integrated Electronics Group"
  short_name: "TIE Group"
  institution: "MIT"
  unit: "Research Laboratory of Electronics / Microsystems Technology Laboratories"
  department: "Electrical Engineering and Computer Science"
  url: "https://hangroup.mit.edu"
  established: 2014
  tagline: "Pushing silicon electronics to its high-frequency limits."
